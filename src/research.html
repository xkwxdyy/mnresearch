<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>MN Research</title>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["$", "$"], ["\\(", "\\)"]],
        displayMath: [["$$", "$$"], ["\\[", "\\]"]]
      },
      svg: {
        fontCache: "global"
      },
      startup: {
        ready: function() {
          MathJax.startup.defaultReady()
          window.dispatchEvent(new CustomEvent("mnresearch-mathjax-ready"))
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles/research.css">
</head>
<body>
  <div id="app" class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <main id="workspace" class="workspace-shell"></main>
  </div>
  <div id="focus-panel"></div>
  <div id="drawer-root"></div>
  <div id="modal-root"></div>

  <script src="es5/tex-svg-full.js"></script>
  <script src="scripts/research-bridge.js"></script>
  <script src="scripts/research-core.js"></script>
  <script src="scripts/research-sample-data.js"></script>
  <script src="scripts/research-data.js"></script>
  <script src="scripts/research-store.js"></script>
  <script src="scripts/research-markdown.js"></script>
  <script src="scripts/research-math-runtime.js"></script>
  <script src="scripts/research-render.js"></script>
  <script src="scripts/research-actions.js"></script>
  <script src="scripts/research-app.js"></script>
</body>
</html>
